name: BCPD workflow runtime CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-bedrock.txt ]; then pip install -r requirements-bedrock.txt; fi
          pip install pytest

      - name: Run full test suite
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tests/

      - name: Regenerate runtime demos
        run: python -m bedrock.workflows.cli all

      - name: Assert no drift in committed runtime demos
        run: git diff --exit-code output/runtime_demo/
