services:
  postgres:
    image: postgres:16-alpine
    container_name: tool-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engine}
      POSTGRES_DB: ${POSTGRES_DB:-engine}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tool-engine-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engine} -d ${POSTGRES_DB:-engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tool-engine-pgdata:
